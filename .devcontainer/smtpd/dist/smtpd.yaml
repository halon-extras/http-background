environment:
  controlsocket:
    chmod: '0660'
    group: staff
  privdrop:
    group: halon
    user: halon
  rlimit:
    nofile: 70000
  umask: '0027'
  uuid:
    version: 4
plugins:
- config:
    threads:
    - id: default
      max_host: 20
      max_total: 100
  id: http-background
servers:
- id: default
  listeners:
  - address: 127.0.0.1
    port: 25
version: '5.8'
