version: "5.8"
servers:
  - id: default
    listeners:
      - port: 25
        address: 127.0.0.1
plugins:
  - id: http-background
    config:
      threads:
        - id: default
          max_total: 100
          max_host: 20
environment:
  uuid:
    version: 4
  controlsocket:
    group: staff
    chmod: "0660"
  privdrop:
    user: halon
    group: halon
  umask: "0027"
  rlimit:
    nofile: 70000
